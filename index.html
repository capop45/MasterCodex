<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex do Mestre - Forja com IA & Exportação</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='50,10 10,40 50,90' fill='%23d4af37'/><polygon points='50,10 90,40 50,90' fill='%23b89020'/><polygon points='10,40 90,40 50,90' fill='%23f1c40f' opacity='0.7'/></svg>" type="image/svg+xml">

    <style>
        /* --- ESTILIZAÇÃO DO TEMA DARK --- */
        body { margin: 0; padding: 0; background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; opacity: 0.8; }
        
        .container { max-width: 800px; margin: 40px auto; padding: 30px; background: rgba(25, 25, 25, 0.85); border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); backdrop-filter: blur(12px); border: 1px solid #333; margin-bottom: 100px;}
        
        h1 { text-align: center; color: #d4af37; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; gap: 10px;}
        h2.section-title { color: #aaa; text-transform: uppercase; font-size: 1.1em; border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 30px; }

        .config-section { background: #222; padding: 20px; border-radius: 8px; margin-bottom: 25px; border-left: 4px solid #d4af37; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        label { font-weight: bold; color: #bbb; display: block; margin-bottom: 8px; }

        input[type="password"], input[type="text"] { width: 100%; padding: 12px; margin-bottom: 15px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; font-size: 16px; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: #d4af37; }

        /* Botão customizado para input de arquivo */
        .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; margin-bottom: 15px; }
        .file-upload-wrapper input[type="file"] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; }
        .file-upload-btn { background: #333; color: #d4af37; border: 1px dashed #d4af37; padding: 12px; text-align: center; border-radius: 4px; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .file-upload-wrapper:hover .file-upload-btn { background: #222; }

        .btn { background: #d4af37; color: #121212; border: none; padding: 14px 20px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 16px; width: 100%; transition: background 0.3s, transform 0.1s; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { background: #f1c40f; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        
        /* Estilos do Cartão Gerado */
        .card { background: linear-gradient(145deg, #2a2a2a, #1f1f1f); padding: 30px; border-radius: 8px; margin-top: 25px; display: none; border: 1px solid #444; box-shadow: inset 0 0 30px rgba(0,0,0,0.7); position: relative;}
        
        .card-image-container { text-align: center; margin-bottom: 20px; display: none; }
        .card-image-container img { max-width: 100%; max-height: 300px; border-radius: 8px; border: 2px solid #d4af37; box-shadow: 0 4px 15px rgba(0,0,0,0.5); object-fit: cover; }

        .stat-block { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; margin-bottom: 20px; }
        .stat { background: #111; padding: 12px; border-radius: 6px; text-align: center; flex: 1; min-width: 60px; border: 1px solid #333; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .stat-name { font-size: 0.8em; color: #888; text-transform: uppercase; font-weight: bold;}
        .stat-value { font-size: 1.5em; font-weight: bold; color: #d4af37; margin-top: 5px; }
        
        #loading { display: none; text-align: center; color: #d4af37; margin-top: 25px; font-style: italic; font-size: 18px; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        ul { padding-left: 20px; color: #ccc; }
        li { margin-bottom: 10px; line-height: 1.6; }

        /* Área de Exportação */
        .export-area { display: none; margin-top: 30px; background: rgba(30, 30, 30, 0.9); padding: 20px; border-radius: 8px; border: 1px solid #444;}
        .export-buttons { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
        
        .btn-export { background: #333; color: #d4af37; border: 1px solid #d4af37; padding: 10px; font-size: 14px; }
        .btn-export:hover { background: #d4af37; color: #121212; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <h1>
            <svg width="30" height="30" viewBox="0 0 100 100"><polygon points="50,10 10,40 50,90" fill="#d4af37"/><polygon points="50,10 90,40 50,90" fill="#b89020"/><polygon points="10,40 90,40 50,90" fill="#f1c40f" opacity="0.7"/></svg>
            Codex do Mestre
        </h1>
        
        <div class="config-section">
            <label for="apiKey">Chave da API do Gemini:</label>
            <input type="password" id="apiKey" placeholder="Cole sua API Key do Google AI Studio...">
            <button class="btn" onclick="saveKey()">Salvar Chave Segura</button>
        </div>

        <div>
            <label for="prompt">O que os deuses devem forjar hoje?</label>
            <input type="text" id="prompt" placeholder="Ex: Um Dragão Ancião de Gelo Lendário Nível 20...">
            
            <label>Ilustração da Criação (Opcional):</label>
            <div class="file-upload-wrapper">
                <div class="file-upload-btn" id="fileNameDisplay">📸 Escolher Imagem do Monstro/NPC</div>
                <input type="file" id="imageUpload" accept="image/*" onchange="handleImageUpload(event)">
            </div>

            <button id="invokeBtn" class="btn" onclick="generateContent()">Invocar Criação</button>
        </div>
        
        <div id="loading">Consultando os tomos antigos... aguarde.</div>

        <div id="outputCard" class="card">
            <div id="cardImageContainer" class="card-image-container">
                <img id="cardImage" src="" alt="Ilustração da Criação">
            </div>

            <h2 id="cardName" style="color: #d4af37; margin-top: 0; border-bottom: 2px solid #d4af37; padding-bottom: 15px; text-transform: uppercase; letter-spacing: 1px;"></h2>
            <p style="color: #ccc; line-height: 1.6; font-style: italic; font-size: 1.1em; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 4px;">"<span id="cardDesc"></span>"</p>
            
            <div class="stat-block" id="statsArea"></div>
            
            <h3 style="color: #d4af37; margin-bottom: 15px; border-bottom: 1px solid #444; padding-bottom: 5px;">Ações & Habilidades:</h3>
            <ul id="cardActions"></ul>
        </div>

        <div id="exportArea" class="export-area">
            <h2 class="section-title">Exportar Criação</h2>
            <div class="export-buttons">
                <button class="btn btn-export" onclick="exportAsJson()">⬇️ JSON</button>
                <button class="btn btn-export" onclick="exportAsHtml()">⬇️ HTML</button>
                <button class="btn btn-export" onclick="exportAsPng()">⬇️ PNG (Imagem)</button>
                <button class="btn btn-export" onclick="exportAsPdf()">⬇️ PDF</button>
                <button class="btn btn-export" onclick="exportAsXlsx()">⬇️ Excel (XLSX)</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    
    <script>
        // --- 1. CONFIGURAÇÃO DO THREE.JS (D20) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const d20 = new THREE.Mesh(new THREE.IcosahedronGeometry(3, 0), new THREE.MeshBasicMaterial({ color: 0xd4af37, wireframe: true, transparent: true, opacity: 0.15 }));
        d20.position.set(4, 0, -8);
        scene.add(d20);
        function animate() { requestAnimationFrame(animate); d20.rotation.x += 0.002; d20.rotation.y += 0.003; renderer.render(scene, camera); }
        animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

        // --- 2. LÓGICA DE DADOS, IMAGEM E GEMINI ---
        
        let currentGenerationData = null;
        let uploadedImageBase64 = null; // Armazena a imagem do usuário

        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('dndGeminiApiKey');
            if (savedKey) document.getElementById('apiKey').value = savedKey;
        });

        function saveKey() {
            const key = document.getElementById('apiKey').value.trim();
            if (key) { localStorage.setItem('dndGeminiApiKey', key); alert('Chave salva com segurança!'); }
        }

        // Carrega a imagem e converte para base64
        function handleImageUpload(event) {
            const file = event.target.files[0];
            const btnDisplay = document.getElementById('fileNameDisplay');
            
            if (file) {
                btnDisplay.innerText = "🖼️ " + file.name;
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedImageBase64 = e.target.result;
                }
                reader.readAsDataURL(file);
            } else {
                btnDisplay.innerText = "📸 Escolher Imagem do Monstro/NPC";
                uploadedImageBase64 = null;
            }
        }

        async function generateContent() {
            const apiKey = localStorage.getItem('dndGeminiApiKey');
            const promptInput = document.getElementById('prompt').value.trim();
            const invokeBtn = document.getElementById('invokeBtn');

            if (!apiKey) { alert('Mestre, salve a Chave da API primeiro.'); return; }
            if (!promptInput) { alert('Descreva o que deseja criar.'); return; }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('outputCard').style.display = 'none';
            document.getElementById('exportArea').style.display = 'none';
            invokeBtn.disabled = true;
            invokeBtn.innerText = 'Invocando...';

            const systemPrompt = `
                Atue como um Mestre de Dungeons & Dragons 5e. Crie o conteúdo solicitado e retorne EXCLUSIVAMENTE um objeto JSON válido, sem markdown (\`\`\`json), com esta estrutura:
                {
                    "nome": "Nome em Português",
                    "descricao": "Descrição concisa da aparência e comportamento",
                    "atributos": {"FOR": 10, "DES": 10, "CON": 10, "INT": 10, "SAB": 10, "CAR": 10},
                    "acoes": ["Ação 1: Detalhes", "Habilidade 1: Detalhes"]
                }
                Pedido: ${promptInput}
            `;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: systemPrompt }] }] })
                });

                if (!response.ok) throw new Error('Falha na API. Verifique a chave.');

                const data = await response.json();
                let jsonText = data.candidates[0].content.parts[0].text;
                jsonText = jsonText.replace(/```json/gi, '').replace(/```/g, '').trim();
                
                currentGenerationData = JSON.parse(jsonText);
                renderCard(currentGenerationData);
                document.getElementById('exportArea').style.display = 'block';

            } catch (error) {
                console.error(error);
                alert('Erro na invocação: ' + error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
                invokeBtn.disabled = false;
                invokeBtn.innerText = 'Invocar Criação';
            }
        }

        function renderCard(data) {
            // Lida com a imagem
            const imgContainer = document.getElementById('cardImageContainer');
            const imgElement = document.getElementById('cardImage');
            
            if (uploadedImageBase64) {
                imgElement.src = uploadedImageBase64;
                imgContainer.style.display = 'block';
            } else {
                imgElement.src = '';
                imgContainer.style.display = 'none';
            }

            document.getElementById('cardName').innerText = data.nome || 'Entidade';
            document.getElementById('cardDesc').innerText = data.descricao || 'Sem descrição.';
            
            const statsArea = document.getElementById('statsArea');
            statsArea.innerHTML = '';
            if (data.atributos) {
                for (const [key, value] of Object.entries(data.atributos)) {
                    statsArea.innerHTML += `
                        <div class="stat">
                            <div class="stat-name">${key}</div>
                            <div class="stat-value">${value}</div>
                        </div>
                    `;
                }
            }

            const actionsArea = document.getElementById('cardActions');
            actionsArea.innerHTML = data.acoes && data.acoes.length > 0 
                ? data.acoes.map(acao => `<li>${acao}</li>`).join('')
                : '<li>Nenhuma ação definida.</li>';

            document.getElementById('outputCard').style.display = 'block';
        }

        // --- 3. LÓGICA DE EXPORTAÇÃO ---

        function getSafeFileName(extension) {
            const name = currentGenerationData?.nome || 'codex_criacao';
            const cleanName = name.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            const timestamp = new Date().getTime();
            return `${cleanName}_${timestamp}.${extension}`;
        }

        function downloadBlob(blob, fileName) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // ⬇️ JSON
        function exportAsJson() {
            if (!currentGenerationData) return;
            const exportData = { ...currentGenerationData, imagemBase64: uploadedImageBase64 || null };
            const jsonStr = JSON.stringify(exportData, null, 4);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            downloadBlob(blob, getSafeFileName('json'));
        }

        // ⬇️ HTML
        function exportAsHtml() {
            if (!currentGenerationData) return;
            const cardHtml = document.getElementById('outputCard').innerHTML;
            const fullHtml = `
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>${currentGenerationData.nome} - Codex</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; padding: 20px; }
        .card { background: #1f1f1f; padding: 30px; border-radius: 8px; border: 1px solid #444; max-width: 700px; margin: 0 auto; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .card-image-container { text-align: center; margin-bottom: 20px; }
        .card-image-container img { max-width: 100%; max-height: 400px; border-radius: 8px; border: 2px solid #d4af37; }
        .stat-block { display: flex; gap: 10px; margin: 20px 0; }
        .stat { background: #111; padding: 12px; border-radius: 6px; text-align: center; flex: 1; border: 1px solid #333; }
        .stat-name { font-size: 0.8em; color: #888; text-transform: uppercase; }
        .stat-value { font-size: 1.5em; font-weight: bold; color: #d4af37; }
        ul { padding-left: 20px; color: #ccc; }
        li { margin-bottom: 10px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">${cardHtml}</div>
</body>
</html>`;
            const blob = new Blob([fullHtml], { type: 'text/html' });
            downloadBlob(blob, getSafeFileName('html'));
        }

        // ⬇️ PNG
        function exportAsPng() {
            const cardElement = document.getElementById('outputCard');
            if (!cardElement) return;
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '📷 Gerando...';
            btn.disabled = true;

            html2canvas(cardElement, { backgroundColor: '#1f1f1f', scale: 2, useCORS: true }).then(canvas => {
                canvas.toBlob(blob => { downloadBlob(blob, getSafeFileName('png')); btn.innerText = originalText; btn.disabled = false; });
            }).catch(err => { alert('Erro ao gerar imagem.'); btn.innerText = originalText; btn.disabled = false; });
        }

        // ⬇️ PDF
        function exportAsPdf() {
            const cardElement = document.getElementById('outputCard');
            if (!cardElement) return;
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '📄 Gerando...';
            btn.disabled = true;

            html2canvas(cardElement, { backgroundColor: '#1f1f1f', scale: 2, useCORS: true }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pageWidth = pdf.internal.pageSize.getWidth();
                const margin = 10;
                const imgWidth = pageWidth - (margin * 2);
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', margin, margin, imgWidth, imgHeight);
                pdf.save(getSafeFileName('pdf'));
                btn.innerText = originalText;
                btn.disabled = false;
            });
        }

        // ⬇️ Excel (Sofisticado com ExcelJS)
        async function exportAsXlsx() {
            if (!currentGenerationData) return;
            const d = currentGenerationData;
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = '📊 Gerando...';
            btn.disabled = true;

            try {
                const workbook = new ExcelJS.Workbook();
                const worksheet = workbook.addWorksheet('Codex');

                // Largura das colunas
                worksheet.columns = [
                    { header: '', key: 'A', width: 22 },
                    { header: '', key: 'B', width: 80 }
                ];

                // Título principal
                const titleRow = worksheet.addRow(['CODEX DO MESTRE - D&D 5E', '']);
                titleRow.font = { name: 'Arial', size: 16, bold: true, color: { argb: 'FFD4AF37' } }; // Gold
                titleRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF121212' } }; // Dark Bg
                worksheet.mergeCells('A1:B1');
                titleRow.alignment = { horizontal: 'center', vertical: 'middle' };

                worksheet.addRow([]); // Espaço em branco

                // Insere Imagem no Excel se existir
                let rowOffset = 3;
                if (uploadedImageBase64) {
                    const base64Data = uploadedImageBase64.split(';base64,')[1];
                    const extension = uploadedImageBase64.substring("data:image/".length, uploadedImageBase64.indexOf(";base64"));
                    
                    const imageId = workbook.addImage({
                        base64: base64Data,
                        extension: extension === 'jpeg' ? 'jpeg' : 'png',
                    });

                    // Coloca a imagem centralizada na planilha
                    worksheet.addImage(imageId, {
                        tl: { col: 0.5, row: rowOffset - 0.5 },
                        ext: { width: 160, height: 160 }
                    });

                    // Pula linhas para não sobrepor o texto embaixo da imagem
                    for(let i = 0; i < 9; i++) worksheet.addRow([]);
                }

                // Nome e Descrição
                const nameRow = worksheet.addRow(['NOME', d.nome]);
                nameRow.font = { size: 12, bold: true, color: { argb: 'FFE0E0E0' } };
                nameRow.getCell(1).font = { bold: true, color: { argb: 'FFD4AF37' } };

                const descRow = worksheet.addRow(['DESCRIÇÃO', d.descricao]);
                descRow.getCell(1).font = { bold: true, color: { argb: 'FFD4AF37' } };
                descRow.getCell(2).alignment = { wrapText: true };
                descRow.getCell(2).font = { italic: true, color: { argb: 'FFCCCCCC' } };

                worksheet.addRow([]);

                // Atributos
                const attrTitle = worksheet.addRow(['ATRIBUTOS', '']);
                attrTitle.font = { bold: true, color: { argb: 'FFD4AF37' } };
                attrTitle.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF222222' } };

                for (const [key, value] of Object.entries(d.atributos)) {
                    const r = worksheet.addRow([key, value]);
                    r.getCell(1).font = { color: { argb: 'FF888888' } };
                    r.getCell(2).font = { bold: true, color: { argb: 'FFD4AF37' } };
                }

                worksheet.addRow([]);

                // Ações
                const actTitle = worksheet.addRow(['AÇÕES E HABILIDADES', '']);
                actTitle.font = { bold: true, color: { argb: 'FFD4AF37' } };
                actTitle.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF222222' } };

                if (d.acoes) {
                    d.acoes.forEach(acao => {
                        const r = worksheet.addRow(['', acao]);
                        r.getCell(2).alignment = { wrapText: true };
                    });
                }

                // Aplica o Dark Mode em todas as células desenhadas e adiciona bordas de grade sutis
                worksheet.eachRow({ includeEmpty: true }, function(row, rowNumber) {
                    row.eachCell({ includeEmpty: true }, function(cell, colNumber) {
                        if (!cell.fill) cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1F1F1F' } };
                        if (!cell.font) cell.font = { color: { argb: 'FFE0E0E0' } };
                        cell.border = {
                            top: {style:'thin', color: {argb:'FF333333'}},
                            left: {style:'thin', color: {argb:'FF333333'}},
                            bottom: {style:'thin', color: {argb:'FF333333'}},
                            right: {style:'thin', color: {argb:'FF333333'}}
                        };
                    });
                });

                const buffer = await workbook.xlsx.writeBuffer();
                const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                downloadBlob(blob, getSafeFileName('xlsx'));

            } catch (e) {
                console.error(e);
                alert('Erro ao gerar a planilha sofisticada do Excel.');
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
